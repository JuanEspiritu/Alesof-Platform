version: "3.9"

services:
  # Base de datos MySQL (DB-LIMA-01)
  db:
    image: mysql:8.0
    container_name: alesof-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?define MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-alesof}
      MYSQL_USER: ${MYSQL_USER:-alesof_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?define MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Backend FastAPI (APP-LIMA-01)
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: alesof-api
    restart: always
    environment:
      APP_ENV: ${APP_ENV:-production}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      SEED_MODE: ${SEED_MODE:-reference}
      ENABLE_SIMULATION: ${ENABLE_SIMULATION:-false}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-alesof_app}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-alesof}
      SECRET_KEY: ${SECRET_KEY:?define SECRET_KEY}
      AGENT_API_KEY: ${AGENT_API_KEY:?define AGENT_API_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../api:/app

  # Frontend Next.js (WEB-LIMA-01)
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: alesof-web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Proxy Reverso Nginx (DMZ — 10.10.90.10)
  nginx:
    image: nginx:alpine
    container_name: alesof-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  db_data:
